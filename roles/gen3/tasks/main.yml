---
# tasks file for gen3
- name: Download uv {{ uv_version }}
  tags: [virtualenv]
  become: yes
  get_url:
    url: "https://github.com/astral-sh/uv/releases/download/{{ uv_version }}/uv-x86_64-unknown-linux-musl.tar.gz"
    dest: "/tmp/uv-{{ uv_version }}.tar.gz"
    checksum: "{{ uv_checksum }}"

- name: Install uv to /usr/local/bin
  tags: [virtualenv]
  become: yes
  unarchive:
    src: "/tmp/uv-{{ uv_version }}.tar.gz"
    dest: /usr/local/bin/
    remote_src: yes
    creates: /usr/local/bin/uv
    extra_opts: ["--strip-components=1", "--wildcards", "*/uv"]

- name: Add gen3 unix group
  become: yes
  group:
      name: "{{ gen3.user }}"
      state: present

- name: Add gen3 unix user
  become: yes
  tags: [gen3user]
  user:
      name: "{{ gen3.user }}"
      group: "{{ gen3.user }}"
      home: "/home/{{ gen3.user }}"
      state: present
      skeleton: /etc/skel
      shell: /bin/zsh

- name: Make sure ~/bin and ~/src exists
  become: yes
  become_user: "{{ gen3.user }}"
  file:
    path: "~/{{ item }}"
    state: directory
  with_items:
    - bin
    - src
    - .kube

- name: Ensure pygments is installed
  tags: [pygments]
  become: yes
  apt:
    name: python3-pygments
    state: present

- name: Install oh-my-zsh
  become: yes
  become_user: "{{ gen3.user }}"
  tags: [zsh]
  block:
    - name: Download oh-my-zsh install script
      get_url:
        url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
        dest: ~/src/install_ohmyzsh.sh
        mode: u=rwx,g=r,o=r
    - name: Run oh-my-zsh install script
      shell:
        cmd: ~/src/install_ohmyzsh.sh --unattended
        creates: ~/.oh-my-zsh
    - name: Copy zshrc
      copy:
        src: zshrc
        dest: ~/.zshrc
        mode: 0600
    - name: Install plugins
      block:
        - name: Install powerlevel 10k
          tags: [powerlevel10k]
          git:
            repo: https://github.com/romkatv/powerlevel10k.git
            dest: ~/.oh-my-zsh/custom/themes/powerlevel10k
            update: false
        - name: Install zsh autosuggestions
          git:
            repo: https://github.com/zsh-users/zsh-autosuggestions
            dest: ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions
            update: false
        - name: Install zsh syntax highlighting
          git:
            repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
            dest: ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
            update: false

- name: Copy kubeconfig file
  tags: [kubeconfig]
  become: yes
  become_user: root
  copy:
      src: "/etc/rancher/rke2/rke2.yaml"
      dest: "/home/{{ gen3.user }}/.kube/config"
      owner: "{{ gen3.user }}"
      group: "{{ gen3.user }}"
      remote_src: true
      mode: 0600

- name: Link kubectl binaries to bin
  become: yes
  tags: [kubectl]
  file:
    src: "/var/lib/rancher/rke2/bin/{{ item }}"
    dest: "/home/{{ gen3.user }}/bin/{{ item }}"
    state: link
  with_items:
    - kubectl
    - kubelet

- name: Add kubectl command line completion
  become: yes
  become_user: "{{ gen3.user }}"
  tags: [kubectl]
  lineinfile:
    path: ~/.bashrc
    line: 'source <(~/bin/kubectl completion bash)'
    insertafter: EOF
    state: present
    create: yes

- { import_tasks: k9s.yml, tags: k9s, become: yes, become_user: "{{ gen3.user }}" }
- { import_tasks: gen3.yml, tags: gen3, become: yes, become_user: "{{ gen3.user }}" }
