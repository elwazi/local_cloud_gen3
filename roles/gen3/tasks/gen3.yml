---
- name: Create gen3 namespace
  command: >
    bin/kubectl create namespace gen3 --dry-run=client -o yaml
  args:
    chdir: /home/{{ gen3.user }}
  register: gen3_ns_yaml
  changed_when: false

- name: Apply gen3 namespace
  command: bin/kubectl apply -f -
  args:
    chdir: /home/{{ gen3.user }}
    stdin: "{{ gen3_ns_yaml.stdout }}"
  register: gen3_ns_apply
  changed_when: '"unchanged" not in gen3_ns_apply.stdout'

- name: Resolve Gen3 users bucket name
  tags: always
  set_fact:
    gen3_user_bucket_name: "{{ gen3.user_bucket_name | default(gen3.hostname ~ '-user-bucket') }}"

- name: Copy utility scripts to ~/bin
  tags: [scripts]
  copy:
    src: "{{ item }}"
    dest: "~/bin/{{ item | basename }}"
    mode: 0755
  with_fileglob:
    - "{{ role_path }}/files/*.sh"

- name: Create .s3cfg file
  tags: [s3cfg, s3]
  template:
    src: s3cfg
    dest: ~/.s3cfg
    mode: 0600

- name: Create venv with uv
  tags: [virtualenv]
  command: uv venv ~/.venv
  args:
    creates: ~/.venv

- name: Install packages with uv
  tags: [virtualenv]
  command: uv pip install --python ~/.venv s3cmd python-openstackclient
  register: uv_install
  changed_when: "'Installed' in uv_install.stdout"

- name: Render user.yaml from template for usersync upload
  tags: [s3, user]
  template:
    src: users.yaml.j2
    dest: ~/user.yaml
    mode: 0600

- name: Upload user.yaml to users bucket
  tags: [s3, user]
  command: "~/.venv/bin/s3cmd put --force ~/user.yaml s3://{{ gen3_user_bucket_name }}/user.yaml"
  register: user_yaml_upload
  changed_when: "'upload:' in user_yaml_upload.stdout"


- name: Apply gen3-db-creds Kubernetes Secret
  tags: [secrets]
  command: bin/kubectl apply -f -
  args:
    chdir: /home/{{ gen3.user }}
    stdin: "{{ lookup('template', 'gen3-db-creds.yaml.j2') }}"
  register: gen3_db_creds_apply
  changed_when: '"unchanged" not in gen3_db_creds_apply.stdout'

- name: Get rke2-coredns pod IP
  tags: [kubedns]
  command: >
    bin/kubectl get endpoints rke2-coredns-rke2-coredns -n kube-system
    -o jsonpath='{.subsets[0].addresses[0].ip}'
  args:
    chdir: /home/{{ gen3.user }}
  register: coredns_ip
  changed_when: false

- name: Apply kube-dns alias
  tags: [kubedns]
  command: bin/kubectl apply -f -
  args:
    chdir: /home/{{ gen3.user }}
    stdin: |
      apiVersion: v1
      kind: Service
      metadata:
        name: kube-dns
        namespace: kube-system
      spec:
        ports:
        - {name: udp-53, port: 53, protocol: UDP, targetPort: 53}
        - {name: tcp-53, port: 53, protocol: TCP, targetPort: 53}
      ---
      apiVersion: v1
      kind: Endpoints
      metadata:
        name: kube-dns
        namespace: kube-system
      subsets:
      - addresses:
        - ip: {{ coredns_ip.stdout }}
        ports:
        - {name: udp-53, port: 53, protocol: UDP}
        - {name: tcp-53, port: 53, protocol: TCP}
  register: kubedns_apply
  changed_when: '"unchanged" not in kubedns_apply.stdout'

- name: Read portal logo
  tags: [argocd, portal]
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/portal/{{ gen3_portal.logo_file | default('sickle_in_africa.png') }}"
  register: _portal_logo
  delegate_to: localhost
  become: false

- name: Read portal favicon
  tags: [argocd, portal]
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/portal/{{ gen3_portal.favicon_file | default('favicon.png') }}"
  register: _portal_favicon
  delegate_to: localhost
  become: false

- name: Read portal createdby logo
  tags: [argocd, portal]
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/portal/createdby.png"
  register: _portal_createdby
  delegate_to: localhost
  become: false

- name: Read sponsor logos
  tags: [argocd, portal]
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/portal/{{ item.file }}"
  loop: "{{ gen3_portal.sponsors | default([]) }}"
  register: _portal_sponsors
  delegate_to: localhost
  become: false

- name: Apply ArgoCD Application
  tags: [argocd]
  command: bin/kubectl apply -f -
  args:
    chdir: /home/{{ gen3.user }}
    stdin: "{{ lookup('template', 'argocd-application.yaml.j2') }}"
  register: argocd_app_apply
  changed_when: '"unchanged" not in argocd_app_apply.stdout'

- name: Wait for ArgoCD to sync gen3 Application
  tags: [argocd]
  command: >
    bin/kubectl wait application.argoproj.io/gen3
    -n argocd
    --for=jsonpath='{.status.sync.status}'=Synced
    --timeout=600s
  args:
    chdir: /home/{{ gen3.user }}
  changed_when: false

- name: Apply ingressconfig.yaml
  tags: [ingress]
  template:
    src: ingressconfig.yaml
    dest: ~/ingressconfig.yaml
    mode: 0600

- name: Apply ingress nginx config
  tags: [ingress]
  command: bin/kubectl apply -f ~/ingressconfig.yaml
  args:
    chdir: /home/{{ gen3.user }}
  register: ingressconfig_apply
  changed_when: '"unchanged" not in ingressconfig_apply.stdout'

- name: Restart ingress-nginx controller pods
  tags: [ingress]
  command: >
    bin/kubectl rollout restart daemonset rke2-ingress-nginx-controller
    -n kube-system
  args:
    chdir: /home/{{ gen3.user }}
  when: ingressconfig_apply.changed
