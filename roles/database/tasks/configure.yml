---
# tasks file for configuring database host
- name: Configure Postgres database
  become: yes
  tags:
    - postgres
  block:
    # add postgres repo so the configured postgres_major_version can be installed
    - name: Add postgres apt repository key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add postgres repository
      apt_repository:
        repo: deb http://apt.postgresql.org/pub/repos/apt/ {{ ansible_facts['distribution_release'] }}-pgdg main
        state: present

    - name: Ensure acl, psycopg2 and libpq-dev are installed and are latest version
      tags:
        - psycopg2
      apt:
        name:
          - acl
          - default-jre
          - libpq-dev
          - postgresql-{{ postgres_major_version }}
          - postgresql-client-{{ postgres_major_version }}
          - postgresql-contrib-{{ postgres_major_version }}
          - python3-psycopg2
        state: latest
        update-cache: yes

    - name: Get postgres version information
      become: yes
      become_user: postgres
      community.postgresql.postgresql_info:
        filter: version
      register: postgres_version

#    - name: Output postgres version
#      debug:
#        msg: "{{ postgres_version.version.major }}"

    - name: Configure postgres to listen to local network
      lineinfile:
        path: "/etc/postgresql/{{ postgres_major_version }}/main/postgresql.conf"
        regex: "^listen_addresses.*"
        line: "listen_addresses = '{% for ip in ansible_facts['all_ipv4_addresses'] %}{{ ip }}{% if not loop.last %}, {% endif %}{% endfor %}, localhost'"
      notify: Restart postgres

    - name: Configure postgres to allow connections on subnet
      lineinfile:
        path: "/etc/postgresql/{{ postgres_major_version }}/main/pg_hba.conf"
        regex: "host *all *all *{{ gen3_subnet }} *md5"
        line: "host    all             all             {{ gen3_subnet }}         md5"
      notify: Restart postgres

    - name: Configure postgres superuser password
      become: yes
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ postgres.user }}"
        password: "{{ postgres.password }}"
        role_attr_flags: "SUPERUSER"
        encrypted: yes

    - name: Restore public schema CREATE privilege for PostgreSQL 15+
      become: yes
      become_user: postgres
      community.postgresql.postgresql_query:
        db: template1
        query: "GRANT CREATE ON SCHEMA public TO PUBLIC"

