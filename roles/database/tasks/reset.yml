---
# Drop all gen3 databases and roles. Run with: --tags reset
# WARNING: This is destructive and irreversible.
# Delete the gen3 namespace before running this so active connections don't block DROP DATABASE.

- name: Drop all gen3 databases
  become: yes
  become_user: postgres
  community.postgresql.postgresql_query:
    db: postgres
    query: >
      DO $$
      DECLARE r RECORD;
      BEGIN
        FOR r IN SELECT datname FROM pg_database WHERE datname LIKE '%\_gen3' LOOP
          EXECUTE 'DROP DATABASE IF EXISTS ' || quote_ident(r.datname);
        END LOOP;
      END $$;
  tags: [never, reset]

- name: Drop all gen3 roles
  become: yes
  become_user: postgres
  community.postgresql.postgresql_query:
    db: postgres
    query: >
      DO $$
      DECLARE r RECORD;
      BEGIN
        FOR r IN SELECT rolname FROM pg_roles WHERE rolname LIKE '%\_gen3' LOOP
          EXECUTE 'DROP ROLE IF EXISTS ' || quote_ident(r.rolname);
        END LOOP;
      END $$;
  tags: [never, reset]
