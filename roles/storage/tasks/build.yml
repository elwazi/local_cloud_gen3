---
# tasks file for building storage image (first provision only)

- name: Build storage node
  become: yes
  tags: [build]
  block:
    - name: Install required packages
      apt:
        name:
          - acl
        state: present
        update_cache: yes

    - name: Download Garage binary
      get_url:
        url: "https://garagehq.deuxfleurs.fr/_releases/{{ garage_version }}/x86_64-unknown-linux-musl/garage"
        dest: /usr/local/bin/garage
        checksum: "{{ garage_checksum }}"
        mode: "0755"

    - name: Create garage system user
      user:
        name: garage
        shell: /usr/sbin/nologin
        create_home: no
        system: yes

    - name: Create garage directories
      file:
        path: "{{ item }}"
        state: directory
        owner: garage
        group: garage
        mode: "0755"
      loop:
        - /etc/garage
        - "{{ garage_meta_dir }}"
        - "{{ garage_data_dir }}"

    - name: Install garage systemd unit
      copy:
        dest: /etc/systemd/system/garage.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Garage S3 object storage
          After=network.target

          [Service]
          Type=simple
          User=garage
          ExecStart=/usr/local/bin/garage -c /etc/garage/garage.toml server
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
